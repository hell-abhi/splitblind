<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C6FE0"/>
      <stop offset="100%" stop-color="#A89AF2"/>
    </linearGradient>
    <linearGradient id="coinLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E4F8"/>
    </linearGradient>
    <linearGradient id="coinRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8E4F8"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Left half of coin (slightly offset left) -->
  <g transform="translate(-12, 0)">
    <path d="M256 100 A140 140 0 0 0 256 380 L256 100 Z" fill="url(#coinLeft)" opacity="0.92"/>
    <!-- Rupee symbol on left half -->
    <g transform="translate(185, 200)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7C6FE0" stroke-width="9" stroke-linecap="round"/>
      <line x1="0" y1="22" x2="50" y2="22" stroke="#7C6FE0" stroke-width="9" stroke-linecap="round"/>
      <path d="M12 0 C12 0 45 0 45 22 C45 45 12 45 12 45 L45 90" fill="none" stroke="#7C6FE0" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Right half of coin (slightly offset right) -->
  <g transform="translate(12, 0)">
    <path d="M256 100 A140 140 0 0 1 256 380 L256 100 Z" fill="url(#coinRight)" opacity="0.92"/>
    <!-- Lock icon on right half -->
    <g transform="translate(274, 195)">
      <!-- Lock body -->
      <rect x="0" y="38" width="52" height="42" rx="8" fill="#7C6FE0"/>
      <!-- Lock shackle -->
      <path d="M10 38 L10 22 C10 4 42 4 42 22 L42 38" fill="none" stroke="#7C6FE0" stroke-width="8" stroke-linecap="round"/>
      <!-- Keyhole -->
      <circle cx="26" cy="56" r="7" fill="white"/>
      <rect x="23" y="56" width="6" height="12" rx="2" fill="white"/>
    </g>
  </g>

  <!-- Split line glow effect (gap between halves) -->
  <line x1="256" y1="108" x2="256" y2="372" stroke="#A89AF2" stroke-width="3" opacity="0.4"/>

  <!-- App name -->
  <text x="256" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-0.5" opacity="0.95">SplitBlind</text>
</svg>
