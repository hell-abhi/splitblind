<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C6FE0"/>
      <stop offset="100%" stop-color="#A89AF2"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Shield shape (protection/blind) -->
  <path d="M256 80 L400 140 L400 280 C400 370 340 430 256 460 C172 430 112 370 112 280 L112 140 Z"
        fill="none" stroke="white" stroke-width="24" stroke-linejoin="round" opacity="0.95"/>
  <!-- Split line through shield (split expenses) -->
  <line x1="256" y1="120" x2="256" y2="440" stroke="white" stroke-width="6" opacity="0.5"/>
  <!-- Left half: currency symbol -->
  <text x="200" y="310" font-family="system-ui,sans-serif" font-size="140" font-weight="800" fill="white" text-anchor="middle" opacity="0.95">₹</text>
  <!-- Right half: lock -->
  <g transform="translate(320, 220)" opacity="0.9">
    <rect x="-28" y="10" width="56" height="44" rx="8" fill="white"/>
    <path d="M-16 10 L-16 -4 C-16 -24 16 -24 16 -4 L16 10" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <circle cx="0" cy="32" r="6" fill="#7C6FE0"/>
  </g>
</svg>
