<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C6FE0"/>
      <stop offset="100%" stop-color="#A89AF2"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Pie circle split into 3 segments -->
  <!-- Segment 1: top-right (lavender light) -->
  <path d="M256 256 L256 96 A160 160 0 0 1 394.6 336 Z" fill="#E8E0FF" opacity="0.95"/>

  <!-- Segment 2: bottom (pink) -->
  <path d="M256 256 L394.6 336 A160 160 0 0 1 117.4 336 Z" fill="#F2C4D8" opacity="0.9"/>

  <!-- Segment 3: top-left (mint) -->
  <path d="M256 256 L117.4 336 A160 160 0 0 1 256 96 Z" fill="#B8E8D8" opacity="0.9"/>

  <!-- Thin white gap lines between segments -->
  <line x1="256" y1="256" x2="256" y2="96" stroke="#7C6FE0" stroke-width="4"/>
  <line x1="256" y1="256" x2="394.6" y2="336" stroke="#7C6FE0" stroke-width="4"/>
  <line x1="256" y1="256" x2="117.4" y2="336" stroke="#7C6FE0" stroke-width="4"/>

  <!-- Center lock circle -->
  <circle cx="256" cy="256" r="42" fill="#7C6FE0"/>
  <circle cx="256" cy="256" r="36" fill="white" opacity="0.95"/>

  <!-- Lock icon in center -->
  <rect x="240" y="260" width="32" height="24" rx="5" fill="#7C6FE0"/>
  <path d="M247 260 L247 250 C247 240 265 240 265 250 L265 260" fill="none" stroke="#7C6FE0" stroke-width="5" stroke-linecap="round"/>
  <circle cx="256" cy="270" r="4" fill="white"/>
  <rect x="254" y="270" width="4" height="7" rx="1.5" fill="white"/>
</svg>
