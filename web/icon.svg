<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C6FE0"/>
      <stop offset="100%" stop-color="#A89AF2"/>
    </linearGradient>
    <linearGradient id="coinL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E4F8"/>
    </linearGradient>
    <linearGradient id="coinR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8E4F8"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Left coin half (offset left) -->
  <g transform="translate(-16, 0)">
    <path d="M256 76 A180 180 0 0 0 256 436 L256 76 Z" fill="url(#coinL)" opacity="0.93"/>
    <!-- Rupee symbol -->
    <g transform="translate(160, 190)">
      <line x1="0" y1="0" x2="62" y2="0" stroke="#7C6FE0" stroke-width="12" stroke-linecap="round"/>
      <line x1="0" y1="28" x2="62" y2="28" stroke="#7C6FE0" stroke-width="12" stroke-linecap="round"/>
      <path d="M14 0 C14 0 56 0 56 28 C56 56 14 56 14 56 L56 115" fill="none" stroke="#7C6FE0" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Right coin half (offset right) -->
  <g transform="translate(16, 0)">
    <path d="M256 76 A180 180 0 0 1 256 436 L256 76 Z" fill="url(#coinR)" opacity="0.93"/>
    <!-- Lock icon -->
    <g transform="translate(270, 185)">
      <rect x="0" y="48" width="66" height="54" rx="10" fill="#7C6FE0"/>
      <path d="M12 48 L12 28 C12 4 54 4 54 28 L54 48" fill="none" stroke="#7C6FE0" stroke-width="10" stroke-linecap="round"/>
      <circle cx="33" cy="70" r="9" fill="white"/>
      <rect x="29" y="70" width="8" height="15" rx="3" fill="white"/>
    </g>
  </g>

  <!-- Subtle split line -->
  <line x1="256" y1="88" x2="256" y2="424" stroke="white" stroke-width="2" opacity="0.2"/>
</svg>
